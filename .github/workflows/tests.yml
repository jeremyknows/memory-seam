name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q
      - name: Compile package
        run: python -m py_compile src/memory_seam/*.py tests/*.py
      - name: Public hygiene scan
        run: python scripts/public_hygiene_scan.py
